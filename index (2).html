<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#A34C5C">
  <title>Meres Sanat Atölyesi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <span class="brand-name">Meres Sanat</span>
      <span class="brand-dot">Atölyesi</span>
    </div>
  </header>

  <!-- ===== PAGES ===== -->
  <main class="page-container">

    <!-- HOME PAGE -->
    <section id="page-home" class="page active">
      <div class="page-header">
        <h1>Dersler</h1>
        <p class="page-subtitle">Tüm atölye dersleri</p>
      </div>

      <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">Tümü</button>
        <button class="filter-chip" data-filter="today">Bugün</button>
        <button class="filter-chip" data-filter="week">Bu Hafta</button>
        <button class="filter-chip" data-filter="unpaid">Ödenmemiş</button>
      </div>

      <div id="lessons-list" class="card-list">
        <!-- Lessons rendered here -->
      </div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">✦</div>
        <p>Henüz ders eklenmedi</p>
        <button class="btn btn-primary" onclick="navigateTo('create-lesson')">İlk Dersi Oluştur</button>
      </div>
    </section>

    <!-- CREATE LESSON PAGE -->
    <section id="page-create-lesson" class="page">
      <div class="page-header">
        <button class="back-btn" onclick="navigateTo('home')">← Geri</button>
        <h1>Yeni Ders</h1>
        <p class="page-subtitle">Atölye dersi oluştur</p>
      </div>

      <form id="form-lesson" class="form-card" onsubmit="return false;">
        <div class="form-group">
          <label for="lesson-name">Ders Adı</label>
          <input type="text" id="lesson-name" placeholder="ör. Suluboya Başlangıç" required>
        </div>

        <div class="form-group">
          <label for="lesson-type">Tür</label>
          <select id="lesson-type" required>
            <option value="">Seçiniz...</option>
            <option value="seramik">Seramik</option>
            <option value="çini">Çini</option>
            <option value="suluboya">Suluboya</option>
            <option value="akrilik">Akrilik Boya</option>
            <option value="yağlıboya">Yağlı Boya</option>
            <option value="karakalem">Karakalem</option>
            <option value="resim">Genel Resim</option>
            <option value="heykel">Heykel</option>
            <option value="mozaik">Mozaik</option>
            <option value="ahşap">Ahşap Boyama</option>
            <option value="cam">Cam Üzeri Boyama</option>
            <option value="alçı">Alçı Heykel</option>
            <option value="rölyef">Rölyef</option>
            <option value="porselen">Porselen Boyama</option>
            <option value="diğer">Diğer</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="lesson-date">Tarih</label>
            <input type="date" id="lesson-date" required>
          </div>
          <div class="form-group">
            <label for="lesson-time">Saat</label>
            <input type="time" id="lesson-time" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="lesson-capacity">Kontenjan</label>
            <input type="number" id="lesson-capacity" min="1" max="50" placeholder="10" required>
          </div>
          <div class="form-group">
            <label for="lesson-price">Ücret (₺)</label>
            <input type="number" id="lesson-price" min="0" step="0.01" placeholder="500" required>
          </div>
        </div>

        <div class="form-group">
          <label for="lesson-teacher">Eğitmen</label>
          <select id="lesson-teacher" required>
            <option value="">Seçiniz...</option>
          </select>
          <button type="button" class="link-btn" onclick="showAddTeacher()">+ Yeni Eğitmen Ekle</button>
        </div>

        <div id="teacher-inline" class="inline-add hidden">
          <input type="text" id="new-teacher-name" placeholder="Eğitmen adı">
          <button type="button" class="btn btn-small" onclick="addTeacherInline()">Ekle</button>
        </div>

        <button type="button" class="btn btn-primary btn-full" onclick="createLesson()">
          Dersi Kaydet
        </button>
      </form>
    </section>

    <!-- ADD STUDENT PAGE -->
    <section id="page-add-student" class="page">
      <div class="page-header">
        <button class="back-btn" onclick="navigateTo('home')">← Geri</button>
        <h1>Öğrenci Kayıt</h1>
        <p class="page-subtitle">Derse öğrenci ekle</p>
      </div>

      <form id="form-student" class="form-card" onsubmit="return false;">
        <div class="form-group">
          <label for="student-name">Öğrenci Adı</label>
          <input type="text" id="student-name" placeholder="Ad Soyad" required autocomplete="off">
          <div id="student-suggestions" class="suggestions hidden"></div>
        </div>

        <div class="form-group">
          <label for="student-phone">Telefon <span class="optional">(isteğe bağlı)</span></label>
          <input type="tel" id="student-phone" placeholder="05XX XXX XX XX">
        </div>

        <div class="form-group">
          <label for="enroll-lesson">Ders</label>
          <select id="enroll-lesson" required>
            <option value="">Ders seçiniz...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="payment-status">Ödeme Durumu</label>
          <div class="payment-chips">
            <button type="button" class="payment-chip active" data-status="paid" onclick="selectPayment(this)">
              <span class="chip-dot paid"></span> Ödendi
            </button>
            <button type="button" class="payment-chip" data-status="pending" onclick="selectPayment(this)">
              <span class="chip-dot pending"></span> Bekliyor
            </button>
            <button type="button" class="payment-chip" data-status="partial" onclick="selectPayment(this)">
              <span class="chip-dot partial"></span> Kısmi
            </button>
          </div>
        </div>

        <div class="form-group" id="paid-amount-group">
          <label for="paid-amount">Ödenen Tutar (₺)</label>
          <input type="number" id="paid-amount" min="0" step="0.01" placeholder="0">
        </div>

        <div class="form-group">
          <label for="enroll-note">Not <span class="optional">(isteğe bağlı)</span></label>
          <textarea id="enroll-note" rows="2" placeholder="Ek bilgi..."></textarea>
        </div>

        <button type="button" class="btn btn-primary btn-full" onclick="enrollStudent()">
          Kaydet
        </button>
      </form>
    </section>

    <!-- LESSON DETAIL PAGE -->
    <section id="page-lesson-detail" class="page">
      <div class="page-header">
        <button class="back-btn" onclick="navigateTo('home')">← Geri</button>
        <h1 id="detail-title">Ders Detayı</h1>
        <p class="page-subtitle" id="detail-subtitle"></p>
      </div>

      <div class="summary-cards" id="detail-summary">
        <!-- Summary cards rendered here -->
      </div>

      <div class="detail-actions">
        <button class="btn btn-primary btn-small" onclick="addStudentToCurrentLesson()">+ Öğrenci Ekle</button>
        <button class="btn btn-outline btn-small" onclick="deleteCurrentLesson()">Dersi Sil</button>
      </div>

      <div id="detail-students" class="student-list">
        <!-- Students rendered here -->
      </div>

      <div id="detail-empty" class="empty-state hidden">
        <p>Bu derse henüz öğrenci kaydedilmedi</p>
      </div>
    </section>

  </main>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigateTo('home')" data-page="home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Dersler</span>
    </button>
    <button class="nav-item" onclick="navigateTo('create-lesson')" data-page="create-lesson">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Yeni Ders</span>
    </button>
    <button class="nav-item" onclick="navigateTo('add-student')" data-page="add-student">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="17" y1="11" x2="23" y2="11"/>
      </svg>
      <span>Öğrenci</span>
    </button>
  </nav>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

  <!-- ===== EDIT MODAL ===== -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeEditModal()"></div>
    <div class="modal-content">
      <h3 id="edit-modal-title">Kayıt Düzenle</h3>
      <div class="form-group">
        <label>Ödeme Durumu</label>
        <div class="payment-chips">
          <button type="button" class="payment-chip" data-status="paid" onclick="selectEditPayment(this)">
            <span class="chip-dot paid"></span> Ödendi
          </button>
          <button type="button" class="payment-chip" data-status="pending" onclick="selectEditPayment(this)">
            <span class="chip-dot pending"></span> Bekliyor
          </button>
          <button type="button" class="payment-chip" data-status="partial" onclick="selectEditPayment(this)">
            <span class="chip-dot partial"></span> Kısmi
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="edit-paid-amount">Ödenen Tutar (₺)</label>
        <input type="number" id="edit-paid-amount" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label for="edit-note">Not</label>
        <textarea id="edit-note" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeEditModal()">İptal</button>
        <button class="btn btn-primary" onclick="saveEnrollmentEdit()">Kaydet</button>
        <button class="btn btn-danger" onclick="removeEnrollment()">Kaydı Sil</button>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
